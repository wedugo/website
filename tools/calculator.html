    <script>
        let currentInput = "0";
        let isEvaluated = false;
        const display = document.getElementById("calc-display");
        const historyDisp = document.getElementById("calc-history");
        const logBox = document.getElementById("history-log");

        function updateDisplay() {
            let view = currentInput
                .replace(/\*\*/g, "^")
                .replace(/Math\./g, "")
                .replace(/\*/g, "×")
                .replace(/\//g, "÷");
            display.innerText = view;
        }

        function input(val) {
            if (isEvaluated) {
                if (!"+-*/%**".includes(val)) {
                    currentInput = val;
                } else {
                    currentInput += val;
                }
                isEvaluated = false;
            } else {
                if (currentInput === "0" && val !== '.') {
                    currentInput = val;
                } else {
                    currentInput += val;
                }
            }
            updateDisplay();
        }

        function inputFunc(func) {
            if (isEvaluated || currentInput === "0") {
                currentInput = func + "(";
                isEvaluated = false;
            } else {
                if (/[0-9PI)]/.test(currentInput.slice(-1))) currentInput += "*";
                currentInput += func + "(";
            }
            updateDisplay();
        }

        function clearDisplay() { currentInput = "0"; historyDisp.innerText = ""; updateDisplay(); }
        
        function backspace() {
            if (isEvaluated) return clearDisplay();
            if (currentInput.endsWith('**')) {
                currentInput = currentInput.slice(0, -2);
            } else {
                currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : "0";
            }
            updateDisplay();
        }

        function factorial() {
            try {
                let num = eval(currentInput.replace(/×/g, '*').replace(/÷/g, '/'));
                let res = 1; for (let i = 2; i <= num; i++) res *= i;
                addToLog(num + "!", res);
                currentInput = res.toString(); isEvaluated = true; updateDisplay();
            } catch(e) { display.innerText = "Error"; }
        }

        function addToLog(eq, res) {
            if (logBox.innerText.includes("Empty")) logBox.innerHTML = "";
            const div = document.createElement('div');
            div.className = "log-item d-flex justify-content-between align-items-center";
            div.innerHTML = `<div><div class="small text-muted">${eq}</div><div class="fw-bold text-primary">${res}</div></div><i class="bi bi-x text-muted" onclick="this.parentElement.remove()"></i>`;
            logBox.prepend(div);
        }

        function calculate() {
            try {
                let expr = currentInput;
                expr = expr.replace(/(\d)(\()/g, '$1*$2');
                expr = expr.replace(/(\))(\d)/g, '$1*$2');
                let open = (expr.match(/\(/g) || []).length;
                let close = (expr.match(/\)/g) || []).length;
                for(let i=0; i < (open-close); i++) expr += ")";
                
                let view = display.innerText;
                if (open > close) for(let i=0; i < (open-close); i++) view += ")";

                let result = eval(expr);
                let finalRes = Number(result.toFixed(10)).toString();

                addToLog(view, finalRes);
                historyDisp.innerText = view + " =";
                currentInput = finalRes; 
                isEvaluated = true; 
                updateDisplay();
            } catch(e) { display.innerText = "Syntax Error"; }
        }

        function clearHistoryLog() {
            logBox.innerHTML = '<div class="text-center text-muted py-5">Empty Session</div>';
        }
    </script>
